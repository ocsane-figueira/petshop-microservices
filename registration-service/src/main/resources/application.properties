# Configuração do Banco de Dados PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=petshop
quarkus.datasource.password=petshop
quarkus.datasource.jdbc.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/petshop_db
quarkus.hibernate-orm.database.generation=update

# Jacoco Test Coverage Configuration
quarkus.jacoco.report=true
quarkus.jacoco.minimum-line-coverage=0.5

# Configuração do RabbitMQ
rabbitmq-host=${RABBITMQ_HOST:localhost}
rabbitmq-port=5672
rabbitmq-username=guest
rabbitmq-password=guest

# Canal de envio de eventos de Cliente
mp.messaging.outgoing.client-created.connector=smallrye-rabbitmq
mp.messaging.outgoing.client-created.exchange.name=client-events

# Canal de envio de eventos de Animal
mp.messaging.outgoing.animal-created.connector=smallrye-rabbitmq
mp.messaging.outgoing.animal-created.exchange.name=animal-events
